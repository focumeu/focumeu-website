<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focumeu - Ristorante</title>
    <link rel="icon" type="image/png" href="/assets/images/favicon.ico" />

    <style>
      @font-face {
        font-family: "Ribes";
        src: url("/assets/fonts/Ribes-Regular.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100dvh;
        background-color: #d24b1b;
        font-family: "Ribes", sans-serif;
      }

      body {
        overflow-x: hidden;
      }

      main {
        width: 100%;
        min-height: 100dvh;
        height: 100%;

        display: flex;
        flex-direction: column;
        align-items: center;

        position: relative;
        overflow: hidden;
      }

      /* main .bg-wave {
        position: absolute;
        z-index: 1;

        width: 2500px;
        height: auto;

        opacity: 0.3;

        left: 50%;
        top: 50%;

        transform: translate(-50%, -50%);

        will-change: transform;

        animation:
          waveHorizontal 20s linear infinite,
          waveFloat 8s ease-in-out infinite;
      } */

      main .bg-wave {
        position: absolute;
        inset: 0;

        z-index: 1;
        opacity: 0.2;

        pointer-events: none;

        background-image: url("/assets/images/wave.webp");
        background-repeat: repeat;
        background-position: center;
        background-size: 1500px auto;

        animation: wavePatternMove 70s linear infinite;
      }

      /* Overlay morbido opzionale */
      main .bg-wave::after {
        content: "";

        position: absolute;
        inset: 0;

        background: radial-gradient(circle at center, transparent 20%, rgba(210, 75, 27, 0.25) 100%);
      }

      /* Movimento lento */
      @keyframes wavePatternMove {
        0% {
          background-position: 0 0;
        }

        100% {
          background-position: 900px 200px;
        }
      }

      section {
        width: 100%;
        min-height: 100%;
        z-index: 2;
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;

        gap: 1.5rem;
        text-align: center;
      }

      .navbar {
        width: 100%;
        background-color: #f7ecdd;
        z-index: 2;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 2rem;
      }

      .logo {
        width: 100%;
        max-width: 320px;
        height: auto;
      }

      .illustration {
        width: auto;
        max-height: 350px;
      }

      h3 {
        text-transform: uppercase;
        color: #f1d08d;

        font-size: clamp(2.2rem, 7vw, 5rem);
        line-height: 1;

        letter-spacing: 1px;
      }

      .date {
        text-transform: uppercase;
        color: #f7ecdd;

        font-size: clamp(1rem, 3vw, 2.5rem);

        letter-spacing: 1px;
      }

      .socials {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;

        margin-top: 0.5rem;
      }

      .socials a {
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .socials svg {
        fill: #f7ecdd;

        width: 58px;
        height: 58px;

        transition:
          fill 0.2s ease,
          transform 0.2s ease;
      }

      .socials svg:hover {
        fill: #f1d08d;
        transform: translateY(-2px);
      }

      .socials p {
        color: #f1d08d;
        text-transform: uppercase;
        font-size: clamp(1rem, 3vw, 2rem);
      }

      /* =========================
         TABLET
      ========================= */

      @media (max-width: 1024px) {
        main .bg-wave {
          background-size: 950px auto;
          opacity: 0.2;
        }
        section {
          gap: 1.25rem;
        }

        .logo {
          max-width: 340px;
        }

        .illustration {
          max-height: 240px;
        }

        .socials svg {
          width: 52px;
          height: 52px;
        }
      }

      /* =========================
         MOBILE
      ========================= */

      @media (max-width: 640px) {
        main .bg-wave {
          background-size: 660px auto;

          opacity: 0.2;

          animation: wavePatternMoveMobile 30s linear infinite;
        }

        .logo {
          width: 220px;
          height: auto;
        }
        section {
          gap: 1rem;
        }

        .logo {
          max-width: 260px;
        }

        .illustration {
          max-height: 150px;
        }

        h3 {
          line-height: 1.1;
        }

        .date {
          max-width: 280px;
          line-height: 1.4;
        }

        .socials {
          gap: 0.5rem;
          margin-top: 0.75rem;
        }

        .socials svg {
          width: 50px;
          height: 50px;
        }
      }

      /* =========================
         SMALL MOBILE
      ========================= */

      @media (max-width: 380px) {
        .logo {
          max-width: 220px;
        }

        .illustration {
          max-height: 75px;
        }

        .socials svg {
          width: 40px;
          height: 40px;
        }
      }

      @keyframes wavePatternMoveMobile {
        0% {
          background-position: 0 0;
        }

        100% {
          background-position: 300px 120px;
        }
      }
    </style>
  </head>
